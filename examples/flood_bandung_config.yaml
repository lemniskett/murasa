name: bandung_flood_example
description: "Example flood susceptibility config for the Rust port"
analysis_type: susceptibility

spatial:
  target_crs: "EPSG:4326"
  metric_crs: "EPSG:3857"
  resolution: 10.0
  study_area_key: admin

output:
  dir: "./output/rust_example"
  formats: ["geojson", "geopackage"]
  generate_report: true

classification:
  method: quantile
  num_classes: 5
  class_names: ["Very Low", "Low", "Moderate", "High", "Very High"]

weights:
  rainfall: 0.25
  elevation: 0.20
  slope: 0.15
  twi: 0.15
  proximity: 0.15
  land_use: 0.10

paths:
  dem: "data/bandung/dem.tif"
  slope: "data/bandung/slope.tif"
  twi: "data/bandung/twi.tif"
  rainfall: "data/bandung/rainfall.shp"
  river: "data/bandung/river.shp"
  land_use: "data/bandung/landuse.shp"
  admin_dirs: ["data/bandung/admin"]
  output_dir: "./output/rust_example"

admin_filename: "ADMINISTRASIDESA_AR_25K.shp"
